<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  * {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 20%, #0c2a45, #071a2d 40%, #051422 100%);
}

header {
    background: #0e2b47;
    color: #ffffff;
    text-align: center;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: box-shadow 0.3s ease, transform 0.3s ease;
    border-radius: 12px;
    margin: 10px auto;
    cursor: pointer;
    position: fixed;
    width: 96%;
    z-index: 1000;
    height: 70px;
    font-size: 0.8em;
}

header:hover {
    box-shadow: 0 10px 30px rgba(96,165,250,0.6), 0 6px 20px rgba(139,92,246,0.5);
    transform: translateY(-3px);
}

.site-links {
    display: flex;
    gap: 30px;
    justify-content: center;
    margin: 40px 0;
}

.site-links a {
    color: #60a5fa;
    text-decoration: none;
    font-weight: bold;
    position: relative;
    transition: all 0.3s ease;
    font-size: 1.6em;
}



.site-links a:hover {
    color: #3b82f6;
}

main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    margin-top: 100px; 
}

.calculadora {
    width: 240px;          
    padding: 15px;
    border-radius: 20px;    
    background: rgba(255,255,255,0.1); 
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.2);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

#display {
    width: 100%;
    height: 40px;           
    border-radius: 12px;
    border: none;
    text-align: right;
    padding: 8px;
    font-size: 1.2em;
    margin-bottom: 12px;
    background-color: rgba(255,255,255,0.15);
    color: #ffffff;
}

.botoes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

button {
    padding: 10px;
    font-size: 1em;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: #ffffff;
    transition: all 0.2s ease-in-out;
}

button:hover {
    background: rgba(96,165,250,0.6);
    box-shadow: 0 4px 12px rgba(96,165,250,0.5);
    transform: translateY(-2px);
}

button.operator {
    background: rgba(147,51,234,0.6); 
}

button.operator:hover {
    background: rgba(147,51,234,0.8);
}

.clear {
    grid-column: span 4;
    background-color: rgba(247, 102, 102,0.8);
    color: #fff;
}

.clear:hover {
    background-color: rgba(247, 102, 102,1);
    box-shadow: 0 4px 12px rgba(247,102,102,0.5);
    transform: translateY(-2px);
}

footer {
    margin-top: auto;
    border-top: 1px solid rgba(255,255,255,0.12);
    background-color: #0f2545;
    color: #ffffff;
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
    height: 125px;
}

footer p {
    margin: 5px 0 10px 0;
    color: #c0c0c0;
    font-size: 14px;
}

.socials {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin: 10px 0 0 0;
    padding: 0;
    list-style: none;
}

.socials li a {
    color: #60a5fa;
    transition: all 0.3s ease;
    align-items: center;
    justify-content: center;
}

.socials li a:hover {
    color: #3b82f6;
    transform: translateY(-5px) scale(1.2);
    text-shadow: 0 0 8px rgba(96,165,250,0.6);
}

@media screen and (max-width: 768px) {

    .site-links {
        margin: 20px 0;
    }

    footer {
        padding: 20px 15px;
        height: auto;
    }
    
}


</style>
</head>
<body>
       <header>
        <h1>Calculadora</h1>
        <nav class="site-links">
    <a href="002.html" ><span class="arrow">←</span></a> 
     <a href="../index.html" ><span class="arrow">←←</span></a>
    </nav>
    </header>

    <main>
        <div class="calculadora">
            <input type="text" id="display" disabled placeholder="0">
            <div class="botoes">
                <button onclick="adicionarValor('7')">7</button>
                <button onclick="adicionarValor('8')">8</button>
                <button onclick="adicionarValor('9')">9</button>
                <button class="operator" onclick="adicionarValor('/')">/</button>
                <button onclick="adicionarValor('4')">4</button>
                <button onclick="adicionarValor('5')">5</button>
                <button onclick="adicionarValor('6')">6</button>
                <button class="operator" onclick="adicionarValor('*')">*</button>
                <button onclick="adicionarValor('1')">1</button>
                <button onclick="adicionarValor('2')">2</button>
                <button onclick="adicionarValor('3')">3</button>
                <button class="operator" onclick="adicionarValor('-')">-</button>
                <button onclick="adicionarValor('0')">0</button>
                <button onclick="adicionarValor('.')">.</button>
                <button onclick="calcular()">=</button>
                <button class="operator" onclick="adicionarValor('+')">+</button>
                <button onclick="limpar()" class="clear">C</button>
            </div>
        </div>
    </main>

        <footer id="Contato">
<p>Fique à vontade para me contatar através das redes abaixo ou pelo email!</p>
    <ul class="socials">
      <li><a href="mailto:suenagalucasmiguel@gmail.com" target="_blank"><i class="fa-solid fa-envelope"></i></a></li>
      <li><a href="https://github.com/lumivivos" target="_blank"><i class="fa-brands fa-github"></i></a></li>

    </ul>
  </div>
  <div class="footer-bottom">
    <p>© 2026 Lucas Miguel Suenaga. Todos os direitos reservados.</p>
  </div>
  
    </footer>


<script>
let display = document.getElementById('display');

function adicionarValor(valor){
    display.value += valor;
}

function calcular(){
    try {
        display.value = eval(display.value);
    } catch {
        display.value = 'Erro';
    }
}

function limpar(){
    display.value = '';
}
</script>
</body>
</html>
